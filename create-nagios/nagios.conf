SetEnvIf Authorization "(.*)" HTTP_AUTHORIZATION=$1
RequestHeader set Authorization %{HTTP_AUTHORIZATION}e env=HTTP_AUTHORIZATION

ScriptAlias /nagios/cgi-bin "/opt/nagios/sbin"
ScriptAlias /nagios_adiarsa/cgi-bin "/opt/nagios/sbin"

<Directory "/opt/nagios/sbin">
   Options ExecCGI
   Header always set X-Frame-Options "ALLOWALL"
   AllowOverride All

   <IfVersion >= 2.3>
      <RequireAll>
         Require all granted
         AuthName "Nagios Access"
         AuthType Basic
         AuthBasicProvider ldap
         AuthLDAPURL "ldap://172.18.0.1:1389/ou=users,dc=bnet,dc=id?uid?sub?(objectClass=inetOrgPerson)"
         AuthLDAPBindDN "cn=admin,dc=bnet,dc=id"
         AuthLDAPBindPassword "admin"
         Require ldap-group cn=nagiosadmins,ou=groups,dc=bnet,dc=id
      </RequireAll>
   </IfVersion>

   <IfVersion < 2.3>
      Order allow,deny
      Allow from all

      AuthName "Nagios Access"
      AuthType Basic
      AuthBasicProvider ldap
      AuthLDAPURL "ldap://172.18.0.1:1389/ou=users,dc=bnet,dc=id?uid?sub?(objectClass=inetOrgPerson)"
      AuthLDAPBindDN "cn=admin,dc=bnet,dc=id"
      AuthLDAPBindPassword "admin"
      Require ldap-group cn=nagiosadmins,ou=groups,dc=bnet,dc=id
   </IfVersion>
</Directory>

Alias /nagios "/opt/nagios/share"
Alias /nagios_adiarsa "/opt/nagios/share"

<Directory "/opt/nagios/share">
   Options None
   AllowOverride All
   Header always set X-Frame-Options "ALLOWALL"

   <IfVersion >= 2.3>
      <RequireAll>
         Require all granted

         AuthName "Nagios Access"
         AuthType Basic
         AuthBasicProvider ldap
         AuthLDAPURL "ldap://172.18.0.1:1389/ou=users,dc=bnet,dc=id?uid?sub?(objectClass=inetOrgPerson)"
         AuthLDAPBindDN "cn=admin,dc=bnet,dc=id"
         AuthLDAPBindPassword "admin"
         Require ldap-group cn=nagiosadmins,ou=groups,dc=bnet,dc=id
      </RequireAll>
   </IfVersion>

   <IfVersion < 2.3>
      Order allow,deny
      Allow from all

      AuthName "Nagios Access"
      AuthType Basic
      AuthBasicProvider ldap
      AuthLDAPURL "ldap://172.18.0.1:1389/ou=users,dc=bnet,dc=id?uid?sub?(objectClass=inetOrgPerson)"
      AuthLDAPBindDN "cn=admin,dc=bnet,dc=id"
      AuthLDAPBindPassword "admin"
      Require ldap-group cn=nagiosadmins,ou=groups,dc=bnet,dc=id
   </IfVersion>
</Directory>
