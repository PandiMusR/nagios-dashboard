{% extends "base.html" %}
{% block title %}Dashboard{% endblock %}
{% block content %}
<style>
    .dashboard-header {
        background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 100%);
        padding: 2rem;
        border-radius: 16px;
        color: white;
        margin-bottom: 2rem;
        box-shadow: 0 10px 30px rgba(79, 70, 229, 0.2);
    }
    .dashboard-header h1 {
        margin: 0 0 0.5rem 0;
        font-size: 2rem;
        font-weight: 700;
    }
    .dashboard-header p {
        margin: 0;
        opacity: 0.9;
        font-size: 0.95rem;
    }
    .stat-badge {
        display: inline-block;
        background: rgba(255,255,255,0.2);
        padding: 0.5rem 1.25rem;
        border-radius: 50px;
        margin-right: 1rem;
        margin-top: 1rem;
        font-size: 0.85rem;
        font-weight: 600;
    }
    .server-card {
        background: white;
        border-radius: 16px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        border: 1px solid var(--bg-tertiary);
        padding: 1.5rem;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        animation: slideUp 0.4s ease;
    }
    .server-card:hover {
        box-shadow: 0 12px 40px rgba(0,0,0,0.12);
        transform: translateY(-4px);
    }
    @keyframes slideUp {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    .server-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.5rem;
        padding-bottom: 1rem;
        border-bottom: 2px solid var(--bg-tertiary);
    }
    .server-name {
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--text-primary);
    }
    .btn-open {
        background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 100%);
        color: white;
        border: none;
        padding: 0.5rem 1.25rem;
        border-radius: 8px;
        font-size: 0.85rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        text-decoration: none;
        display: inline-block;
    }
    .btn-open:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 16px rgba(79, 70, 229, 0.3);
    }
    .resource-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 1rem;
        margin-bottom: 1.5rem;
    }
    .resource-item {
        background: linear-gradient(135deg, var(--bg-primary) 0%, #eef2ff 100%);
        padding: 1rem;
        border-radius: 12px;
        border: 1px solid var(--border-color);
    }
    .resource-label {
        font-size: 0.75rem;
        font-weight: 600;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 0.5rem;
    }
    .resource-value {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--text-primary);
    }
    .status-section {
        margin-bottom: 1.5rem;
    }
    .status-title {
        font-size: 0.9rem;
        font-weight: 700;
        color: var(--text-secondary);
        margin-bottom: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
    .status-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
        gap: 0.75rem;
    }
    .status-badge {
        padding: 0.75rem;
        border-radius: 10px;
        text-align: center;
        font-weight: 600;
        transition: all 0.2s;
    }
    .status-badge:hover {
        transform: scale(1.05);
    }
    .status-value {
        font-size: 1.25rem;
        font-weight: 700;
        margin-bottom: 0.25rem;
    }
    .status-label {
        font-size: 0.75rem;
        opacity: 0.8;
    }
    .status-up { background: var(--alert-success-bg); color: var(--alert-success-color); }
    .status-down { background: var(--alert-error-bg); color: var(--alert-error-color); }
    .status-warning { background: var(--alert-warning-bg); color: var(--alert-warning-color); }
    .status-unknown { background: var(--bg-tertiary); color: var(--text-secondary); }
    .loading-spinner {
        display: inline-block;
        width: 16px;
        height: 16px;
        border: 2px solid var(--bg-tertiary);
        border-top-color: var(--color-primary);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    .servers-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
        gap: 1.5rem;
    }
    @media (max-width: 768px) {
        .servers-grid {
            grid-template-columns: 1fr;
        }
        .dashboard-header {
            padding: 1.5rem;
        }
        .dashboard-header h1 {
            font-size: 1.5rem;
        }
    }
</style>

<div class="dashboard-header">
    <h1><i class="fas fa-tachometer-alt" style="margin-right: 0.5rem;"></i>Monitoring Dashboard</h1>
    <p>Monitor all Nagios servers in real-time</p>
    <div>
        <span class="stat-badge">
            <span class="loading-spinner"></span>
            Auto-refresh: <span id="refresh_countdown" style="font-weight: 700;">30</span>s
        </span>
        <span class="stat-badge">Last update: <span id="last_update" style="font-weight: 700;">-</span></span>
    </div>
</div>

<div class="servers-grid" id="servers_container">
    <div style="grid-column: 1 / -1; text-align: center; padding: 3rem; color: var(--text-muted);">
        <div style="font-size: 1rem; margin-bottom: 0.5rem;"><span class="loading-spinner"></span> Loading servers...</div>
    </div>
</div>

<script>
let refreshInterval;
let countdownInterval;
let countdown = 30;

function loadDashboardStats() {
    fetch('/dashboard/stats')
        .then(response => response.json())
        .then(data => {
            updateDashboard(data.servers);
            document.getElementById('last_update').textContent = new Date().toLocaleTimeString('en-US', {hour12: false});
            countdown = 30;
        })
        .catch(error => {
            console.error('Error:', error);
            document.getElementById('servers_container').innerHTML = '<div style="grid-column: 1 / -1; text-align: center; padding: 2rem; color: var(--color-danger-alt);"><i class="fas fa-exclamation-circle"></i> Error loading servers</div>';
        });
}

function updateDashboard(servers) {
    const container = document.getElementById('servers_container');
    
    if (servers.length === 0) {
        container.innerHTML = '<div style="grid-column: 1 / -1; text-align: center; padding: 2rem; color: var(--text-muted);"><i class="fas fa-inbox"></i> No servers found</div>';
        return;
    }
    
    container.innerHTML = servers.map(server => {
        const hasDown = server.hosts.down > 0;
        const borderColor = hasDown ? 'var(--color-danger)' : 'var(--color-success)';
        return `
        <div class="server-card" style="border-left: 4px solid ${borderColor};">
            <div class="server-header">
                <div class="server-name"><i class="fas fa-server" style="margin-right: 0.5rem; color: var(--color-primary);"></i>${server.name}</div>
                <a href="/nagios/${server.name}" target="_blank" class="btn-open"><i class="fas fa-external-link-alt"></i> Open Nagios</a>
            </div>
            
            <!-- System Resources -->
            <div class="resource-grid">
                <div class="resource-item">
                    <div class="resource-label"><i class="fas fa-microchip"></i> CPU</div>
                    <div class="resource-value">${server.cpu}</div>
                </div>
                <div class="resource-item">
                    <div class="resource-label"><i class="fas fa-memory"></i> Memory</div>
                    <div class="resource-value">${server.memory}</div>
                </div>
            </div>
            
            <!-- Hosts Status -->
            <div class="status-section">
                <div class="status-title">Hosts (${server.hosts.total})</div>
                <div class="status-grid">
                    <div class="status-badge status-up">
                        <div class="status-value">${server.hosts.up}</div>
                        <div class="status-label">UP</div>
                    </div>
                    <div class="status-badge status-down">
                        <div class="status-value">${server.hosts.down}</div>
                        <div class="status-label">DOWN</div>
                    </div>
                    <div class="status-badge status-warning">
                        <div class="status-value">${server.hosts.unreachable}</div>
                        <div class="status-label">UNREACH</div>
                    </div>
                </div>
            </div>
            
            <!-- Services Status -->
            <div class="status-section">
                <div class="status-title">Services (${server.services.total})</div>
                <div class="status-grid">
                    <div class="status-badge status-up">
                        <div class="status-value">${server.services.ok}</div>
                        <div class="status-label">OK</div>
                    </div>
                    <div class="status-badge status-warning">
                        <div class="status-value">${server.services.warning}</div>
                        <div class="status-label">WARN</div>
                    </div>
                    <div class="status-badge status-down">
                        <div class="status-value">${server.services.critical}</div>
                        <div class="status-label">CRIT</div>
                    </div>
                    <div class="status-badge status-unknown">
                        <div class="status-value">${server.services.unknown}</div>
                        <div class="status-label">UNKNOWN</div>
                    </div>
                </div>
            </div>
        </div>
    `}).join('');
}

function startAutoRefresh() {
    loadDashboardStats();
    
    refreshInterval = setInterval(() => {
        loadDashboardStats();
    }, 30000);
    
    countdownInterval = setInterval(() => {
        countdown--;
        if (countdown < 0) countdown = 30;
        document.getElementById('refresh_countdown').textContent = countdown;
    }, 1000);
}

window.addEventListener('load', startAutoRefresh);
window.addEventListener('beforeunload', () => {
    if (refreshInterval) clearInterval(refreshInterval);
    if (countdownInterval) clearInterval(countdownInterval);
});
</script>
{% endblock %}
