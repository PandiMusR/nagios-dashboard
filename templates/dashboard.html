{% extends "base.html" %}
{% block title %}Dashboard{% endblock %}
{% block content %}
<link rel="stylesheet" href="/static/css/dashboard.css">

<div class="dashboard-header">
    <h1><i class="fas fa-tachometer-alt" style="margin-right: 0.5rem;"></i>Monitoring Dashboard</h1>
    <p>Monitor all Nagios servers in real-time</p>
    <div>
        <span class="stat-badge">
            <span class="loading-spinner"></span>
            Auto-refresh: <span id="refresh_countdown" style="font-weight: 700;">30</span>s
        </span>
        <span class="stat-badge">Update terakhir: <span id="last_update" style="font-weight: 700;">-</span></span>
    </div>
</div>

<div class="servers-grid" id="servers_container">
    <div style="grid-column: 1 / -1; text-align: center; padding: 3rem; color: var(--text-muted);">
        <div style="font-size: 1rem; margin-bottom: 0.5rem;"><span class="loading-spinner"></span> Memuat server...</div>
    </div>
</div>

<script src="/static/js/dashboard.js"></script>
{% endblock %}
